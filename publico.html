<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 - Calendário</title>
    <meta name="description" content="Calendário de Jogos e Bilhetes do FIFA World Cup 2026">
    <meta property="og:title" content="FIFA World Cup 2026 - Calendário">
    <meta property="og:description" content="Calendário de Jogos e Bilhetes do FIFA World Cup 2026">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --primary: #00D26A;
            --primary-dark: #00B159;
            --border: #E2E8F0;
            --text-main: #1A202C;
            --text-muted: #718096;
        }

        .hero {
            background-color: #1A202C;
            color: white;
            text-align: center;
            padding: 4rem 2rem;
            margin-bottom: 2rem;
        }

        .hero img {
            width: 60px;
            margin-bottom: 1rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .hero p {
            color: #A0AEC0;
            font-size: 1.1rem;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .filter-pill {
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            border: 1px solid #E2E8F0;
            background: white;
            cursor: pointer;
            font-weight: 600;
            color: #4A5568;
        }

        .filter-pill.active {
            background: #00D26A;
            color: white;
            border-color: #00D26A;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .match-table-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #E2E8F0;
            overflow: hidden;
        }

        .table-header {
            padding: 1.5rem;
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem 1.5rem;
            color: #718096;
            font-size: 0.75rem;
            text-transform: uppercase;
            background: #F7FAFC;
        }

        td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #EDF2F7;
            font-size: 0.9rem;
        }

        .btn-buy {
            background: #00D26A;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .phase-badge {
            background: #EBF4FF;
            color: #3182CE;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 999; display: none; opacity: 0;
            transition: opacity 0.3s;
        }
        .sidebar-overlay.active { display: block; opacity: 1; }

        .groups-sidebar {
            position: fixed; top: 0; left: -450px; width: 450px; max-width: 100%; height: 100vh;
            background: #F8F9FA; z-index: 1000; box-shadow: 5px 0 25px rgba(0,0,0,0.1);
            transition: left 0.3s ease; overflow-y: auto; padding: 2rem; box-sizing: border-box;
        }
        .groups-sidebar.active { left: 0; }

        .btn-floating {
            position: fixed; bottom: 30px; left: 30px;
            background: var(--primary); color: white; padding: 1rem 1.5rem;
            border-radius: 50px; font-weight: 700; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,210,106,0.3); z-index: 998;
            display: flex; align-items: center; gap: 10px; border: none;
            font-size: 1.1rem; transition: transform 0.2s;
        }
        .btn-floating:hover { transform: translateY(-3px); }

        .group-table-public { width: 100%; border-collapse: collapse; margin-bottom: 2rem; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .group-table-public th { background: #EDF2F7; padding: 0.8rem; text-align: left; font-size: 0.85rem; color: #4A5568; }
        .group-table-public td { padding: 0.8rem; border-top: 1px solid #E2E8F0; font-size: 0.9rem; font-weight: 600; }
        .group-table-public tr:nth-child(1) td, .group-table-public tr:nth-child(2) td { background-color: #F0FFF4; border-left: 3px solid var(--primary); }
    </style>
</head>

<body style="display: block; background-color: #F8F9FA;">

    <!-- Sidebar dos Grupos -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleGroupsSidebar()"></div>
    <div class="groups-sidebar" id="groups-sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2 style="margin: 0; font-size: 1.5rem;">Fase de Grupos</h2>
            <button onclick="toggleGroupsSidebar()" style="background: none; border: none; font-size: 2rem; cursor: pointer; color: #A0AEC0;">&times;</button>
        </div>
        <div id="public-groups-container">
            <!-- Grupos renderizados via JS -->
        </div>
    </div>

    <!-- Botão Flutuante -->
    <button class="btn-floating" onclick="toggleGroupsSidebar()">
        📊 Classificação dos Grupos
    </button>

    <header class="hero" aria-label="public">
        <div
            style="background: #00D26A; width: 50px; height: 50px; border-radius: 12px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
            🌐</div>
        <h1>FIFA World Cup 2026</h1>
        <p>Calendário de Jogos & Bilhetes</p>
    </header>

    <!-- BRACKET DE TORNEIO -->
    <div class="match-table-card" style="margin-bottom: 2rem; overflow-x: auto;">
        <div class="table-header">
            <span>🏆</span> Bracket do Torneio
        </div>
        <div style="padding: 1.5rem; min-width: 780px;">
            <div id="bracket-container" style="display: flex; align-items: stretch; gap: 0;"></div>
        </div>
    </div>

    <div class="container">
        <div class="filters" id="phase-filters">
            <button class="filter-pill active" data-phase="Todos">Todos</button>
            <button class="filter-pill" data-phase="Grupos">Grupos</button>
            <button class="filter-pill" data-phase="Dezasseis-avos">16-avos</button>
            <button class="filter-pill" data-phase="Oitavos">Oitavos</button>
            <button class="filter-pill" data-phase="Quartos">Quartos</button>
            <button class="filter-pill" data-phase="Meias-Finais">Meias-Finais</button>
            <button class="filter-pill" data-phase="Final">Final</button>
            <div style="width: 1px; height: 28px; background: #E2E8F0; margin: 0 4px;"></div>
            <select id="country-select"
                style="padding: 0.5rem 1.5rem 0.5rem 1rem; border-radius: 50px; border: 1px solid #E2E8F0; font-weight: 600; color: #4A5568; cursor: pointer;">
                <option value="">🌍 Todos os países</option>
            </select>
            <select id="date-select"
                style="padding: 0.5rem 1.5rem 0.5rem 1rem; border-radius: 50px; border: 1px solid #E2E8F0; font-weight: 600; color: #4A5568; cursor: pointer;">
                <option value="">📅 Todas as datas</option>
            </select>

            <select id="time-select"
                style="padding: 0.5rem 1.5rem 0.5rem 1rem; border-radius: 50px; border: 1px solid #E2E8F0; font-weight: 600; color: #4A5568; cursor: pointer;">
                <option value="">🕐 Todos os horários</option>
            </select>
        </div>

        <div class="match-table-card">
            <div class="table-header" style="justify-content: space-between;">
                <div><span>🗓️</span> Calendário de Jogos</div>

            </div>
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Hora</th>
                        <th>Jogo</th>
                        <th>Estádio</th>
                        <th>Fase</th>
                        <th>Bilhetes</th>
                    </tr>
                </thead>
                <tbody id="public-matches-body">
                    <!-- Dinâmico -->
                </tbody>
            </table>
        </div>
    </div>

    <br>

    <header class="hero" style="margin-bottom: 0;">
        <div
            style="background: #00D26A; width: 50px; height: 50px; border-radius: 12px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
            🌐</div>
        <h2 style="font-size: 2rem; margin: 0;">FIFA World Cup 2026</h2>
        <p>Calendário de Jogos & Bilhetes</p>
    </header>

    <script src="app.js"></script>
    <script>
        let currentFilter = 'Todos';
        let currentCountry = '';

        function populateCountries() {
            const data = getData();
            const countries = new Set();
            data.matches.forEach(m => {
                countries.add(m.homeTeam);
                countries.add(m.awayTeam);
            });
            const sel = document.getElementById('country-select');
            [...countries].sort().forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                sel.appendChild(opt);
            });
        }
        let currentDate = '';
        let currentTime = '';

        function populateDatesAndTimes() {
            const data = getData();
            const dates = new Set();
            const times = new Set();

            data.matches.forEach(m => {
                dates.add(m.date);
                times.add(m.time);
            });

            const dateSel = document.getElementById('date-select');
            [...dates].sort().forEach(d => {
                const opt = document.createElement('option');
                opt.value = d;
                // Formata "2026-06-10" → "10 Jun 2026"
                opt.textContent = new Date(d).toLocaleDateString('pt-PT', { day: '2-digit', month: 'short', year: 'numeric' });
                dateSel.appendChild(opt);
            });

            const timeSel = document.getElementById('time-select');
            [...times].sort().forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                timeSel.appendChild(opt);
            });
        }
        const BRACKET_FLAGS = {
            'Portugal': '🇵🇹', 'Espanha': '🇪🇸', 'Brasil': '🇧🇷', 'França': '🇫🇷',
            'Argentina': '🇦🇷', 'Inglaterra': '🏴', 'Alemanha': '🇩🇪'
        };

        function renderBracket() {
            const data = getData();
            const container = document.getElementById('bracket-container');
            container.innerHTML = '';
            
            const SLOT_H = 148; 
            const totalH = 4 * SLOT_H; 

            const byPhase = {
                'Oitavos': data.matches.filter(m => m.phase === 'Oitavos').sort((a,b) => a.id - b.id),
                'Quartos': data.matches.filter(m => m.phase === 'Quartos').sort((a,b) => a.id - b.id),
                'Meias-Finais': data.matches.filter(m => m.phase === 'Meias-Finais').sort((a,b) => a.id - b.id),
                'Final': data.matches.filter(m => m.phase === 'Final').sort((a,b) => a.id - b.id),
            };

            function matchEl(m, slotHeight) {
                const home = m ? m.homeTeam : '';
                const away = m ? m.awayTeam : '';
                const div = document.createElement('div');
                div.style.cssText = `height:${slotHeight}px; display:flex; flex-direction:column; justify-content:center; padding:0 8px; box-sizing:border-box;`;
                div.innerHTML = `
            <div style="border:1px solid #E2E8F0; border-bottom:none; border-radius:6px 6px 0 0; padding:6px 10px; font-size:11px; font-weight:${home ? '600' : '400'}; color:${home ? '#1A202C' : '#A0AEC0'}; background:white; display:flex; align-items:center; gap:6px; white-space:nowrap; overflow:hidden;">
                <span>${BRACKET_FLAGS[home] || ''}</span>${home || 'A definir'}
            </div>
            <div style="border:1px solid #E2E8F0; border-radius:0 0 6px 6px; padding:6px 10px; font-size:11px; font-weight:${away ? '600' : '400'}; color:${away ? '#1A202C' : '#A0AEC0'}; background:white; display:flex; align-items:center; gap:6px; white-space:nowrap; overflow:hidden;">
                <span>${BRACKET_FLAGS[away] || ''}</span>${away || 'A definir'}
            </div>`;
                return div;
            }

            function connectorSVG(count, slotH, side = 'left') {
                const h = count * slotH; 
                let paths = '';
                for (let i = 0; i < count / 2; i++) {
                    const y1 = slotH * (i * 2) + slotH / 2;     
                    const y2 = slotH * (i * 2 + 1) + slotH / 2; 
                    const mid = (y1 + y2) / 2;
                    if (side === 'left') {
                        paths += `<line x1="0" y1="${y1}" x2="10" y2="${y1}" stroke="#CBD5E0" stroke-width="1.5"/><line x1="10" y1="${y1}" x2="10" y2="${y2}" stroke="#CBD5E0" stroke-width="1.5"/><line x1="10" y1="${y2}" x2="0" y2="${y2}" stroke="#CBD5E0" stroke-width="1.5"/><line x1="10" y1="${mid}" x2="20" y2="${mid}" stroke="#CBD5E0" stroke-width="1.5"/>`;
                    } else {
                        paths += `<line x1="20" y1="${y1}" x2="10" y2="${y1}" stroke="#CBD5E0" stroke-width="1.5"/><line x1="10" y1="${y1}" x2="10" y2="${y2}" stroke="#CBD5E0" stroke-width="1.5"/><line x1="10" y1="${y2}" x2="20" y2="${y2}" stroke="#CBD5E0" stroke-width="1.5"/><line x1="10" y1="${mid}" x2="0" y2="${mid}" stroke="#CBD5E0" stroke-width="1.5"/>`;
                    }
                }
                const div = document.createElement('div');
                div.style.cssText = `flex-shrink:0; height:${h}px;`;
                div.innerHTML = `<svg width="20" height="${h}" style="display:block;">${paths}</svg>`;
                return div;
            }

            function buildPhaseCol(label, matches, slotHeight) {
                const col = document.createElement('div');
                col.style.cssText = `display:flex; flex-direction:column; flex:1; min-width:130px;`;
                const lbl = document.createElement('div');
                lbl.style.cssText = 'text-align:center; font-size:10px; font-weight:700; color:#718096; text-transform:uppercase; letter-spacing:0.06em; height:24px; display:flex; align-items:center; justify-content:center; flex-shrink:0;';
                lbl.textContent = label;
                col.appendChild(lbl);
                const wrap = document.createElement('div');
                wrap.style.cssText = `height:${totalH}px; display:flex; flex-direction:column; justify-content:space-around;`;
                matches.forEach(m => wrap.appendChild(matchEl(m, slotHeight)));
                col.appendChild(wrap);
                return col;
            }

            function buildConnectorCol(count, slotH, side) {
                const col = document.createElement('div');
                col.style.cssText = 'flex-shrink:0; display:flex; flex-direction:column;';
                const spacer = document.createElement('div');
                spacer.style.cssText = 'height:24px; flex-shrink:0;';
                col.appendChild(spacer);
                col.appendChild(connectorSVG(count, slotH, side));
                return col;
            }

            // LADO ESQUERDO
            const leftSide = document.createElement('div');
            leftSide.style.cssText = 'display:flex; align-items:center; flex:1;';
            leftSide.appendChild(buildPhaseCol('Oitavos', byPhase['Oitavos'].slice(0, 4), SLOT_H));
            leftSide.appendChild(buildConnectorCol(4, SLOT_H, 'left'));
            leftSide.appendChild(buildPhaseCol('Quartos', byPhase['Quartos'].slice(0, 2), SLOT_H * 2));
            leftSide.appendChild(buildConnectorCol(2, SLOT_H * 2, 'left'));
            leftSide.appendChild(buildPhaseCol('Meia-Final', byPhase['Meias-Finais'].slice(0, 1), SLOT_H * 4));
            
            // CENTRO (FINAL)
            const centerCol = document.createElement('div');
            centerCol.style.cssText = 'display:flex; flex-direction:column; align-items:center; min-width:160px; padding: 0 10px;';
            const trophy = document.createElement('div');
            trophy.style.cssText = 'font-size:40px; margin-bottom:10px; margin-top: 24px;';
            trophy.innerHTML = '🏆';
            centerCol.appendChild(trophy);
            centerCol.appendChild(buildPhaseCol('GRANDE FINAL', byPhase['Final'], SLOT_H * 2));

            // LADO DIREITO (INVERTIDO)
            const rightSide = document.createElement('div');
            rightSide.style.cssText = 'display:flex; align-items:center; flex:1; flex-direction:row-reverse;';
            rightSide.appendChild(buildPhaseCol('Oitavos', byPhase['Oitavos'].slice(4, 8), SLOT_H));
            rightSide.appendChild(buildConnectorCol(4, SLOT_H, 'right'));
            rightSide.appendChild(buildPhaseCol('Quartos', byPhase['Quartos'].slice(2, 4), SLOT_H * 2));
            rightSide.appendChild(buildConnectorCol(2, SLOT_H * 2, 'right'));
            rightSide.appendChild(buildPhaseCol('Meia-Final', byPhase['Meias-Finais'].slice(1, 2), SLOT_H * 4));

            container.appendChild(leftSide);
            container.appendChild(centerCol);
            container.appendChild(rightSide);
        }

        function renderPublicMatches() {
            const data = getData();
            const body = document.getElementById('public-matches-body');
            body.innerHTML = '';

            const filtered = data.matches.filter(m => {
                const phaseOk = currentFilter === 'Todos' || m.phase.includes(currentFilter);
                const countryOk = !currentCountry || m.homeTeam === currentCountry || m.awayTeam === currentCountry;
                const dateOk = !currentDate || m.date === currentDate;
                const timeOk = !currentTime || m.time === currentTime;
                return phaseOk && countryOk && dateOk && timeOk && m.status !== 'Finalizado';
            });


            if (!filtered.length) {
                body.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 2rem; color: #A0AEC0;">Sem jogos para este filtro.</td></tr>`;
                return;
            }

            filtered.forEach(match => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
            <td style="font-weight: 600;">${match.date}</td>
            <td>${match.time}</td>
            <td>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-weight: 700;">${match.homeTeam}</span>
                    <span style="color: #A0AEC0;">vs</span>
                    <span style="font-weight: 700;">${match.awayTeam}</span>
                </div>
            </td>
            <td style="color: #718096;">${match.stadium}</td>
            <td><span class="phase-badge">${match.phase}</span></td>
            <td>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <span style="font-size: 0.8rem; color: #718096;">+351 210 000 001</span>
                    <a href="#" class="btn-buy" onclick="alert('Redirecionando para TicketMaster...')">Comprar ↗️</a>
                </div>
            </td>
        `;
                body.appendChild(tr);
            });
        }

        // Filtros de fase
        document.getElementById('phase-filters').addEventListener('click', (e) => {
            if (!e.target.classList.contains('filter-pill')) return;
            document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            currentFilter = e.target.getAttribute('data-phase');
            renderPublicMatches();
        });

        // Filtro de país
        document.getElementById('country-select').addEventListener('change', (e) => {
            currentCountry = e.target.value;
            renderPublicMatches();
        });

        document.addEventListener('DOMContentLoaded', () => {
            populateCountries();
            populateDatesAndTimes();
            renderBracket();
            renderPublicMatches();
            renderPublicGroupStandings();
        });

        function toggleGroupsSidebar() {
            const sidebar = document.getElementById('groups-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            const isActive = sidebar.classList.contains('active');
            
            if (isActive) {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            } else {
                renderPublicGroupStandings(); // Refresh dados
                sidebar.classList.add('active');
                overlay.classList.add('active');
            }
        }

        function renderPublicGroupStandings() {
            const data = getData();
            const container = document.getElementById('public-groups-container');
            container.innerHTML = '';

            data.groups.forEach(group => {
                const standings = calculateGroupStandings(group.name);
                
                const tableHTML = `
                    <h3 style="margin-bottom: 0.5rem; color: #2D3748;">${group.name}</h3>
                    <table class="group-table-public">
                        <thead>
                            <tr>
                                <th>Equipa</th>
                                <th>Pts</th>
                                <th>J</th>
                                <th>V</th>
                                <th>E</th>
                                <th>D</th>
                                <th>GM</th>
                                <th>GS</th>
                                <th>SG</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${standings.map(s => `
                                <tr>
                                    <td>${s.name}</td>
                                    <td style="color: var(--primary); font-size: 1rem;">${s.points}</td>
                                    <td>${s.played}</td>
                                    <td>${s.won}</td>
                                    <td>${s.drawn}</td>
                                    <td>${s.lost}</td>
                                    <td>${s.goalsFor}</td>
                                    <td>${s.goalsAgainst}</td>
                                    <td>${s.goalsFor - s.goalsAgainst}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
                container.innerHTML += tableHTML;
            });
        }
        document.getElementById('date-select').addEventListener('change', (e) => {
            currentTime = ''; // reset hora ao mudar data
            document.getElementById('time-select').value = '';
            currentDate = e.target.value;
            renderPublicMatches();
        });

        document.getElementById('time-select').addEventListener('change', (e) => {
            currentTime = e.target.value;
            renderPublicMatches();
        });
    </script>
</body>

</html>
