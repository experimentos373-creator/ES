<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 - Calendário</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .hero {
            background-color: #1A202C;
            color: white;
            text-align: center;
            padding: 4rem 2rem;
            margin-bottom: 2rem;
        }

        .hero img {
            width: 60px;
            margin-bottom: 1rem;
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .hero p {
            color: #A0AEC0;
            font-size: 1.1rem;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .filter-pill {
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            border: 1px solid #E2E8F0;
            background: white;
            cursor: pointer;
            font-weight: 600;
            color: #4A5568;
        }

        .filter-pill.active {
            background: #00D26A;
            color: white;
            border-color: #00D26A;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .match-table-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border: 1px solid #E2E8F0;
            overflow: hidden;
        }

        .table-header {
            padding: 1.5rem;
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 700;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 1rem 1.5rem;
            color: #718096;
            font-size: 0.75rem;
            text-transform: uppercase;
            background: #F7FAFC;
        }

        td {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid #EDF2F7;
            font-size: 0.9rem;
        }

        .btn-buy {
            background: #00D26A;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            font-size: 0.8rem;
        }

        .phase-badge {
            background: #EBF4FF;
            color: #3182CE;
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
        }
    </style>
</head>

<body style="display: block; background-color: #F8F9FA;">

    <header class="hero">
        <div
            style="background: #00D26A; width: 50px; height: 50px; border-radius: 12px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
            🌐</div>
        <h1>FIFA World Cup 2026</h1>
        <p>Calendário de Jogos & Bilhetes</p>
    </header>

    <!-- BRACKET DE TORNEIO -->
    <div class="match-table-card" style="margin-bottom: 2rem; overflow-x: auto;">
        <div class="table-header">
            <span>🏆</span> Bracket do Torneio
        </div>
        <div style="padding: 1.5rem; min-width: 780px;">
            <div id="bracket-container" style="display: flex; align-items: stretch; gap: 0;"></div>
        </div>
    </div>

    <div class="container">
        <div class="filters" id="phase-filters">
            <button class="filter-pill active" data-phase="Todos">Todos</button>
            <button class="filter-pill" data-phase="Grupos">Grupos</button>
            <button class="filter-pill" data-phase="Oitavos">Oitavos</button>
            <button class="filter-pill" data-phase="Quartos">Quartos</button>
            <button class="filter-pill" data-phase="Meias-Finais">Meias-Finais</button>
            <button class="filter-pill" data-phase="Final">Final</button>
            <div style="width: 1px; height: 28px; background: #E2E8F0; margin: 0 4px;"></div>
            <select id="country-select"
                style="padding: 0.5rem 1.5rem 0.5rem 1rem; border-radius: 50px; border: 1px solid #E2E8F0; font-weight: 600; color: #4A5568; cursor: pointer;">
                <option value="">🌍 Todos os países</option>
            </select>
            <select id="date-select"
                style="padding: 0.5rem 1.5rem 0.5rem 1rem; border-radius: 50px; border: 1px solid #E2E8F0; font-weight: 600; color: #4A5568; cursor: pointer;">
                <option value="">📅 Todas as datas</option>
            </select>

            <select id="time-select"
                style="padding: 0.5rem 1.5rem 0.5rem 1rem; border-radius: 50px; border: 1px solid #E2E8F0; font-weight: 600; color: #4A5568; cursor: pointer;">
                <option value="">🕐 Todos os horários</option>
            </select>
        </div>

        <div class="match-table-card">
            <div class="table-header" style="justify-content: space-between;">
                <div><span>🗓️</span> Calendário de Jogos</div>

            </div>
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Hora</th>
                        <th>Jogo</th>
                        <th>Estádio</th>
                        <th>Fase</th>
                        <th>Bilhetes</th>
                    </tr>
                </thead>
                <tbody id="public-matches-body">
                    <!-- Dinâmico -->
                </tbody>
            </table>
        </div>
    </div>

    <br>

    <header class="hero" style="margin-bottom: 0;">
        <div
            style="background: #00D26A; width: 50px; height: 50px; border-radius: 12px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
            🌐</div>
        <h1>FIFA World Cup 2026</h1>
        <p>Calendário de Jogos & Bilhetes</p>
    </header>

    <script src="app.js"></script>
    <script>
        let currentFilter = 'Todos';
        let currentCountry = '';

        function populateCountries() {
            const data = getData();
            const countries = new Set();
            data.matches.forEach(m => {
                countries.add(m.homeTeam);
                countries.add(m.awayTeam);
            });
            const sel = document.getElementById('country-select');
            [...countries].sort().forEach(c => {
                const opt = document.createElement('option');
                opt.value = c;
                opt.textContent = c;
                sel.appendChild(opt);
            });
        }
        let currentDate = '';
        let currentTime = '';

        function populateDatesAndTimes() {
            const data = getData();
            const dates = new Set();
            const times = new Set();

            data.matches.forEach(m => {
                dates.add(m.date);
                times.add(m.time);
            });

            const dateSel = document.getElementById('date-select');
            [...dates].sort().forEach(d => {
                const opt = document.createElement('option');
                opt.value = d;
                // Formata "2026-06-10" → "10 Jun 2026"
                opt.textContent = new Date(d).toLocaleDateString('pt-PT', { day: '2-digit', month: 'short', year: 'numeric' });
                dateSel.appendChild(opt);
            });

            const timeSel = document.getElementById('time-select');
            [...times].sort().forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                timeSel.appendChild(opt);
            });
        }
        const BRACKET_FLAGS = {
            'Portugal': '🇵🇹', 'Espanha': '🇪🇸', 'Brasil': '🇧🇷', 'França': '🇫🇷',
            'Argentina': '🇦🇷', 'Inglaterra': '🏴', 'Alemanha': '🇩🇪'
        };

        function renderBracket() {
            const data = getData();
            const container = document.getElementById('bracket-container');
            container.innerHTML = '';
            container.style.cssText = 'display:flex; align-items:stretch; overflow-x:auto;';

            const SLOT_H = 74; // altura base de cada jogo dos Oitavos em px

            const byPhase = {
                'Oitavos': data.matches.filter(m => m.phase === 'Oitavos'),
                'Quartos': data.matches.filter(m => m.phase === 'Quartos'),
                'Meias-Finais': data.matches.filter(m => m.phase === 'Meias-Finais'),
                'Final': data.matches.filter(m => m.phase === 'Final'),
            };

            const totalH = 8 * SLOT_H; // altura total do bracket (8 slots de oitavos)

            function matchEl(m, slotHeight) {
                const home = m ? m.homeTeam : '';
                const away = m ? m.awayTeam : '';
                const div = document.createElement('div');
                div.style.cssText = `height:${slotHeight}px; display:flex; flex-direction:column; justify-content:center; padding:0 8px; box-sizing:border-box;`;
                div.innerHTML = `
            <div style="border:1px solid #E2E8F0; border-bottom:none; border-radius:6px 6px 0 0; padding:7px 10px; font-size:12px; font-weight:${home ? '600' : '400'}; color:${home ? '#1A202C' : '#A0AEC0'}; background:white; display:flex; align-items:center; gap:6px; white-space:nowrap;">
                <span>${BRACKET_FLAGS[home] || ''}</span>${home || 'A definir'}
            </div>
            <div style="border:1px solid #E2E8F0; border-radius:0 0 6px 6px; padding:7px 10px; font-size:12px; font-weight:${away ? '600' : '400'}; color:${away ? '#1A202C' : '#A0AEC0'}; background:white; display:flex; align-items:center; gap:6px; white-space:nowrap;">
                <span>${BRACKET_FLAGS[away] || ''}</span>${away || 'A definir'}
            </div>`;
                return div;
            }

            function connectorSVG(count, slotH) {
                // count = número de jogos nesta coluna (que vai ser reduzido a metade)
                const h = count * slotH; // altura total desta coluna
                let paths = '';
                for (let i = 0; i < count / 2; i++) {
                    const y1 = slotH * (i * 2) + slotH / 2;      // centro do jogo de cima
                    const y2 = slotH * (i * 2 + 1) + slotH / 2;  // centro do jogo de baixo
                    const mid = (y1 + y2) / 2;
                    paths += `
                <line x1="0" y1="${y1}" x2="10" y2="${y1}" stroke="#CBD5E0" stroke-width="1.5"/>
                <line x1="10" y1="${y1}" x2="10" y2="${y2}" stroke="#CBD5E0" stroke-width="1.5"/>
                <line x1="10" y1="${y2}" x2="0" y2="${y2}" stroke="#CBD5E0" stroke-width="1.5"/>
                <line x1="10" y1="${mid}" x2="20" y2="${mid}" stroke="#CBD5E0" stroke-width="1.5"/>`;
                }
                const div = document.createElement('div');
                div.style.cssText = `flex-shrink:0; height:${h}px;`;
                div.innerHTML = `<svg width="20" height="${h}" style="display:block;">${paths}</svg>`;
                return div;
            }

            function buildPhaseCol(label, matches, slotHeight) {
                const col = document.createElement('div');
                col.style.cssText = `display:flex; flex-direction:column; flex:1; min-width:140px;`;

                // Label no topo
                const lbl = document.createElement('div');
                lbl.style.cssText = 'text-align:center; font-size:11px; font-weight:700; color:#718096; text-transform:uppercase; letter-spacing:0.06em; height:24px; display:flex; align-items:center; justify-content:center; flex-shrink:0;';
                lbl.textContent = label;
                col.appendChild(lbl);

                // Wrapper dos jogos com altura total fixa
                const wrap = document.createElement('div');
                wrap.style.cssText = `height:${totalH}px; display:flex; flex-direction:column;`;
                matches.forEach(m => wrap.appendChild(matchEl(m, slotHeight)));
                col.appendChild(wrap);
                return col;
            }

            function buildConnectorCol(count, slotH) {
                const col = document.createElement('div');
                col.style.cssText = 'flex-shrink:0; display:flex; flex-direction:column;';
                // Espaço para o label (alinhado com labels das colunas)
                const spacer = document.createElement('div');
                spacer.style.cssText = 'height:24px; flex-shrink:0;';
                col.appendChild(spacer);
                col.appendChild(connectorSVG(count, slotH));
                return col;
            }

            // Oitavos — 8 jogos, slotH = SLOT_H
            container.appendChild(buildPhaseCol('Oitavos', byPhase['Oitavos'], SLOT_H));
            container.appendChild(buildConnectorCol(8, SLOT_H));

            // Quartos — 4 jogos, slotH = SLOT_H * 2
            container.appendChild(buildPhaseCol('Quartos', byPhase['Quartos'], SLOT_H * 2));
            container.appendChild(buildConnectorCol(4, SLOT_H * 2));

            // Meias-Finais — 2 jogos, slotH = SLOT_H * 4
            container.appendChild(buildPhaseCol('Meias-Finais', byPhase['Meias-Finais'], SLOT_H * 4));
            container.appendChild(buildConnectorCol(2, SLOT_H * 4));

            // Final — 1 jogo, centrado verticalmente
            const finalMatch = byPhase['Final'][0];
            const finalCol = document.createElement('div');
            finalCol.style.cssText = 'flex-shrink:0; min-width:140px; display:flex; flex-direction:column; align-items:center;';

            const finalLbl = document.createElement('div');
            finalLbl.style.cssText = 'height:24px; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#718096; text-transform:uppercase; letter-spacing:0.06em; flex-shrink:0;';
            finalLbl.textContent = 'Final';
            finalCol.appendChild(finalLbl);

            const finalWrap = document.createElement('div');
            finalWrap.style.cssText = `height:${totalH}px; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%;`;
            finalWrap.innerHTML = `<div style="font-size:22px; margin-bottom:8px;">🏆</div>`;
            if (finalMatch) finalWrap.appendChild(matchEl(finalMatch, SLOT_H));
            finalCol.appendChild(finalWrap);
            container.appendChild(finalCol);
        }

        function renderPublicMatches() {
            const data = getData();
            const body = document.getElementById('public-matches-body');
            body.innerHTML = '';

            const filtered = data.matches.filter(m => {
                const phaseOk = currentFilter === 'Todos' || m.phase.includes(currentFilter);
                const countryOk = !currentCountry || m.homeTeam === currentCountry || m.awayTeam === currentCountry;
                const dateOk = !currentDate || m.date === currentDate;
                const timeOk = !currentTime || m.time === currentTime;
                return phaseOk && countryOk && dateOk && timeOk;
            });


            if (!filtered.length) {
                body.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 2rem; color: #A0AEC0;">Sem jogos para este filtro.</td></tr>`;
                return;
            }

            filtered.forEach(match => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
            <td style="font-weight: 600;">${match.date}</td>
            <td>${match.time}</td>
            <td>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span style="font-weight: 700;">${match.homeTeam}</span>
                    <span style="color: #A0AEC0;">vs</span>
                    <span style="font-weight: 700;">${match.awayTeam}</span>
                </div>
            </td>
            <td style="color: #718096;">${match.stadium}</td>
            <td><span class="phase-badge">${match.phase}</span></td>
            <td>
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <span style="font-size: 0.8rem; color: #718096;">+351 210 000 001</span>
                    <a href="#" class="btn-buy" onclick="alert('Redirecionando para TicketMaster...')">Comprar ↗️</a>
                </div>
            </td>
        `;
                body.appendChild(tr);
            });
        }

        // Filtros de fase
        document.getElementById('phase-filters').addEventListener('click', (e) => {
            if (!e.target.classList.contains('filter-pill')) return;
            document.querySelectorAll('.filter-pill').forEach(btn => btn.classList.remove('active'));
            e.target.classList.add('active');
            currentFilter = e.target.getAttribute('data-phase');
            renderPublicMatches();
        });

        // Filtro de país
        document.getElementById('country-select').addEventListener('change', (e) => {
            currentCountry = e.target.value;
            renderPublicMatches();
        });

        document.addEventListener('DOMContentLoaded', () => {
            populateCountries();
            populateDatesAndTimes();
            renderBracket();
            renderPublicMatches();
        });
        document.getElementById('date-select').addEventListener('change', (e) => {
            currentTime = ''; // reset hora ao mudar data
            document.getElementById('time-select').value = '';
            currentDate = e.target.value;
            renderPublicMatches();
        });

        document.getElementById('time-select').addEventListener('change', (e) => {
            currentTime = e.target.value;
            renderPublicMatches();
        });
    </script>
</body>

</html>
