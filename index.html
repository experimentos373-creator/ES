<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA World Cup 2026 - Portal</title>
    <meta name="description" content="Portal de Gestão e Consulta do FIFA World Cup 2026">
    <meta property="og:title" content="FIFA World Cup 2026 - Portal">
    <meta property="og:description" content="Portal de Gestão e Consulta do FIFA World Cup 2026">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #1A202C 0%, #2D3748 100%); 
            color: white; 
            text-align: center; 
            margin: 0;
            font-family: 'Outfit', sans-serif;
        }
        .portal-card { 
            background: white; 
            color: #333; 
            padding: 3.5rem; 
            border-radius: 32px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            max-width: 450px; 
            width: 90%;
        }
        h1 { margin-bottom: 0.5rem; font-weight: 800; color: #1A202C; font-size: 2rem; }
        p { color: #666; margin-bottom: 2.5rem; }
        .btn-portal { 
            display: block; 
            width: 100%; 
            padding: 1.2rem; 
            margin-top: 1rem; 
            background: #00D26A; 
            color: white; 
            border-radius: 16px; 
            text-decoration: none; 
            font-weight: 700; 
            transition: all 0.2s; 
            box-shadow: 0 4px 6px rgba(0, 210, 106, 0.2);
        }
        .btn-portal:hover { transform: translateY(-2px); background: #00B95D; box-shadow: 0 10px 15px rgba(0, 210, 106, 0.3); }
        .btn-secondary { background: #2D3748; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .btn-secondary:hover { background: #1A202C; box-shadow: 0 10px 15px rgba(0, 0, 0, 0.2); }
    </style>
</head>
<body>
    <div class="portal-card" aria-label="portal">
        <div style="font-size: 4rem; margin-bottom: 1.5rem;">🏆</div>
        <h1>World Cup 2026</h1>
        <p>Bem-vindo ao Portal de Gestão e Consulta</p>
        
        <a href="publico.html" class="btn-portal">Vista Pública (Calendário)</a>
        <a href="gestor_arbitragem.html" class="btn-portal btn-secondary">Gestor de Arbitragem</a>
        
        <div style="margin-top: 2rem; font-size: 0.8rem; color: #999; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;">
            FIFA Official Partner
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
